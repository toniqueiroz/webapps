<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CineX - Video Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-primary: #000000;
      --bg-surface: #585858;
      --bg-card: #282828;
      --bg-card-alt: rgba(0, 0, 0, 0.2);
      --bg-overlay: rgba(0, 0, 0, 0.2);
      --accent: #e8ff17;
      --text-primary: #c8c8c8;
      --text-secondary: #c9c9c9;
      --text-dark: #000000;
      --border-color: rgba(154, 154, 154, 0.3);
      --progress-bg: #393939;
      --volume-bg: #676767;
      --aside-bg: #b9b9b9;
      --alert-bg: rgba(113, 113, 113, 0.2);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 100px;
      --font: 'Outfit', sans-serif;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    /* ═══════════════════════════ MAIN LAYOUT ═══════════════════════════ */
    .editor-page {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    .body-wrapper {
      display: flex;
      flex-direction: row;
      flex: 1;
      overflow: hidden;
      gap: 8px;
      justify-content: center;
    }

    .aside {
      display: flex;
      flex-direction: column;
      flex: 1;
      background: var(--aside-bg);
      overflow: hidden;
    }

    .canvas {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      flex: 1;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      overflow: hidden;
    }

    /* ═══════════════════════════ CONTENT / PREVIEW ═══════════════════════════ */
    .content-area {
      position: relative;
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .vertical-video-preview {
      height: 100%;
      aspect-ratio: 9 / 16;
      max-width: 100%;
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .alert-joining {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--alert-bg);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 14px;
      padding: 8px 16px;
    }

    .alert-joining i {
      color: var(--accent);
      font-size: 34px;
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .alert-joining span {
      color: var(--text-primary);
      font-size: 16px;
      font-weight: 400;
    }

    /* Right side floating menu */
    .right-side-menu {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      background: var(--bg-card);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: var(--radius-xl);
      padding: 16px;
      z-index: 10;
    }

    .right-side-menu i {
      font-size: 32px;
      color: var(--text-primary);
      cursor: pointer;
      transition: color 0.2s, transform 0.2s;
    }

    .right-side-menu i:hover {
      transform: scale(1.1);
      color: var(--accent);
    }

    .right-side-menu i.active {
      color: var(--accent);
    }

    /* ═══════════════════════════ EDITOR CONTROLS PANEL ═══════════════════════════ */
    .editor-controls {
      background: var(--bg-surface);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      padding: 8px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    /* ─── Player Control ─── */
    .player-control-wrapper {
      padding: 0 8px;
    }

    .player-control {
      background: var(--bg-overlay);
      border-radius: var(--radius-lg);
      padding: 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .progress-bar-container {
      display: flex;
      align-items: center;
      width: 100%;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--progress-bg);
      border-radius: var(--radius-full);
      cursor: pointer;
      position: relative;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: var(--radius-full);
      width: 0%;
      transition: width 0.1s;
      position: relative;
    }

    .progress-bar-thumb {
      position: absolute;
      right: -7px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 50%;
      cursor: grab;
      z-index: 2;
      transition: transform 0.15s;
      box-shadow: 0 0 4px rgba(0,0,0,0.4);
    }

    .progress-bar-thumb:hover {
      transform: translateY(-50%) scale(1.3);
    }

    .progress-bar-thumb:active,
    .progress-bar-thumb.dragging {
      cursor: grabbing;
      transform: translateY(-50%) scale(1.4);
    }

    .progress-bar.dragging .progress-bar-fill {
      transition: none;
    }

    .info-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      gap: 8px;
    }

    .time-info {
      font-size: 16px;
      font-weight: 400;
      color: var(--text-primary);
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }

    .button-icons-play {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      flex: 1;
      min-width: 0;
      border-radius: var(--radius-sm);
      padding: 4px 0;
    }

    .button-icons-play i {
      font-size: 28px;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .button-icons-play i:hover {
      transform: scale(1.15);
      color: var(--accent);
    }

    .button-icons-play i.play-icon { color: var(--text-primary); }
    .button-icons-play i.pause-icon { color: var(--accent); }
    .button-icons-play i.stop-icon { color: var(--text-primary); }
    .button-icons-play i.loop-icon { color: var(--text-primary); }
    .button-icons-play i.loop-icon.active { color: var(--accent); }

    .button-icons-play i.play-icon:hover,
    .button-icons-play i.pause-icon:hover,
    .button-icons-play i.stop-icon:hover,
    .button-icons-play i.loop-icon:hover {
      color: var(--accent);
    }

    .controls-right {
      display: flex;
      justify-content: flex-end;
      flex: 1;
      min-width: 0;
    }

    .controls-right i {
      font-size: 28px;
      color: var(--text-primary);
      cursor: pointer;
      transition: color 0.2s, transform 0.2s;
    }

    .controls-right i:hover {
      color: var(--accent);
    }

    /* ─── Music Section ─── */
    .music-section-wrapper {
      padding: 0 8px;
    }

    .music-section {
      background: var(--bg-overlay);
      border-radius: var(--radius-lg);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .music-wave-frame {
      height: 34px;
      border-radius: var(--radius-sm);
      padding: 0 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .music-wave-frame span {
      font-size: 14px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .music-row {
      display: flex;
      gap: 8px;
      width: 100%;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .music-row::-webkit-scrollbar { display: none; }

    .volume-control {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: var(--radius-md);
      padding: 0 8px;
      height: 42px;
      min-width: 120px;
      flex-shrink: 0;
    }

    .volume-control i {
      font-size: 22px;
      color: var(--text-primary);
      flex-shrink: 0;
      transition: color 0.2s;
      cursor: pointer;
    }

    .volume-control:hover i {
      color: var(--accent);
    }

    .volume-bar {
      flex: 1;
      height: 6px;
      background: var(--volume-bg);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .volume-bar-fill {
      height: 100%;
      width: 20%;
      background: var(--text-primary);
      border-radius: var(--radius-full);
    }

    .music-button {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: var(--radius-md);
      padding: 0 8px;
      height: 42px;
      min-width: 0;
      flex-shrink: 0;
      cursor: pointer;
      transition: background 0.2s;
      overflow: hidden;
    }

    .music-button:hover {
      background: #333;
    }

    .music-button i {
      font-size: 22px;
      color: var(--text-primary);
      flex-shrink: 0;
      transition: color 0.2s;
    }

    .music-button:hover i {
      color: var(--accent);
    }

    .music-button span {
      font-size: 14px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .music-button.fill {
      flex: 1;
      min-width: 140px;
    }

    /* ─── Takes List ─── */
    .takes-scroll-wrapper {
      padding: 0 8px;
    }

    .takes-list {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .takes-list::-webkit-scrollbar { display: none; }

    .take-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
      width: 200px;
      transition: transform 0.2s ease, opacity 0.2s ease;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
    }

    .take-card:active {
      cursor: grabbing;
    }

    .take-card.dragging {
      opacity: 0.4;
      transform: scale(0.95);
      cursor: grabbing;
    }

    .take-card.drag-gap-left {
      transform: translateX(24px);
    }

    .take-card.drag-gap-right {
      transform: translateX(-24px);
    }

    .take-card.drag-ghost {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.9;
      transform: scale(1.04);
      box-shadow: 0 12px 32px rgba(0,0,0,0.45), 0 0 0 2px var(--accent);
      border-radius: var(--radius-lg);
      transition: none;
      cursor: grabbing;
    }

    .take-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      background: var(--bg-overlay);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: var(--radius-lg);
      padding: 8px;
      overflow: hidden;
    }

    .ta-duration {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: var(--text-dark);
      font-size: 14px;
      font-weight: 400;
      border-radius: var(--radius-sm);
      height: 30px;
      padding: 0 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .take-label i {
      font-size: 26px;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.15s;
    }

    .take-label i:hover {
      transform: scale(1.15);
      color: var(--accent);
    }

    .take-label i.icon-default { color: var(--text-primary); }
    .take-label i.icon-active { color: var(--accent); }

    .take-label i.icon-default:hover,
    .take-label i.icon-active:hover {
      color: var(--accent);
    }

    .take-body {
      border-radius: var(--radius-lg);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .take-body.inputs {
      background: var(--bg-overlay);
      position: relative;
      transition: box-shadow 0.25s ease;
    }

    .take-body.inputs.active-take {
      box-shadow: inset 0 0 0 2px var(--accent);
    }

    .take-body.inputs::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 0;
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, #54554b, rgba(0,0,0,0.2));
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }

    .take-body.inputs:hover::before {
      opacity: 1;
    }

    .take-body.inputs > *,
    .take-body.outputs > * {
      position: relative;
      z-index: 1;
    }

    .take-body.outputs {
      background: var(--bg-overlay);
      position: relative;
    }

    .take-body.outputs::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, #54554b, rgba(0,0,0,0.2));
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }

    .take-body.outputs:hover::before {
      opacity: 1;
    }

    .prompt-box {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: var(--radius-sm);
      padding: 8px;
      height: 160px;
      overflow-y: auto;
      resize: none;
      width: 100%;
      font-family: var(--font);
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 400;
      line-height: 1.4;
      outline: none;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }

    .prompt-box::-webkit-scrollbar {
      width: 3px;
    }

    .prompt-box::-webkit-scrollbar-track {
      background: transparent;
      margin: 4px 0;
    }

    .prompt-box::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
    }

    .prompt-box::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.28);
    }

    .video-thumbnail-container {
      position: relative;
      width: 100%;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
      background: var(--bg-card);
    }

    .video-thumbnail-container img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
    }

    .video-thumbnail-play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(237, 232, 221, 0.3);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }

    .video-thumbnail-play i {
      font-size: 22px;
      color: #fff;
    }

    .video-thumbnail-play:hover {
      background: rgba(237, 232, 221, 0.5);
    }

    /* Frame reference / dropzone */
    .take-body:has(.frame-dropzone + .frame-dropzone) {
      flex-direction: row;
    }

    .frame-dropzone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }

    .frame-preview {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: var(--radius-sm);
      background: rgba(154, 154, 154, 0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .frame-preview:hover {
      background: rgba(154, 154, 154, 0.45);
    }

    .frame-preview i {
      font-size: 32px;
      color: var(--text-primary);
    }

    .frame-dropzone span {
      font-size: 13px;
      color: var(--text-primary);
      text-align: center;
    }

    /* Add Take */
    .add-take-card {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .add-take-inner {
      background: var(--bg-overlay);
      border-radius: var(--radius-lg);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 106px;
      height: 100%;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      position: relative;
    }

    .add-take-inner::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 0;
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, #54554b, rgba(0,0,0,0.2));
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }

    .add-take-inner:hover::before {
      opacity: 1;
    }

    .add-take-inner > * {
      position: relative;
      z-index: 1;
    }

    .add-take-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex: 1;
      cursor: pointer;
    }

    .add-take-icon {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: var(--radius-sm);
      background: rgba(154, 154, 154, 0.3);
      min-height: 60px;
      transition: background 0.2s;
    }

    .add-take-icon:hover {
      background: rgba(154, 154, 154, 0.45);
    }

    .add-take-icon i {
      font-size: 28px;
      color: var(--text-primary);
      transition: color 0.2s;
    }

    .add-take-icon:hover i {
      color: var(--accent);
    }

    .add-take-btn span {
      font-size: 13px;
      color: var(--text-primary);
      text-align: center;
    }

    /* ─── Create New Take (bottom CTA) ─── */
    .create-take-wrapper {
      padding: 0 8px;
    }

    .create-new-take {
      background: var(--bg-overlay);
      border-radius: var(--radius-lg);
      padding: 8px;
      height: 90px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      position: relative;
    }

    .create-new-take::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 0;
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, #54554b, rgba(0,0,0,0.2));
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }

    .create-new-take:hover::before {
      opacity: 1;
    }

    .create-new-take > * {
      position: relative;
      z-index: 1;
    }

    .create-take-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
    }

    .create-take-btn-area {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: var(--radius-sm);
      background: rgba(154, 154, 154, 0.3);
      cursor: pointer;
      transition: background 0.2s;
    }

    .create-take-btn-area:hover {
      background: rgba(154, 154, 154, 0.45);
    }

    .create-take-btn-area .plus-icon {
      background: var(--bg-overlay);
      border-radius: var(--radius-sm);
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .create-take-btn-area i {
      font-size: 24px;
      color: var(--text-primary);
      transition: color 0.2s;
    }

    .create-take-btn-area:hover i {
      color: var(--accent);
    }

    .create-take-content > span {
      font-size: 14px;
      color: var(--text-primary);
      text-align: center;
    }

    /* ═══════════════════════════ RESPONSIVE ═══════════════════════════ */

    /* Mobile-first: max 480px */
    @media (max-width: 480px) {
      .right-side-menu {
        right: 8px;
        padding: 10px;
        gap: 12px;
      }
      .right-side-menu i {
        font-size: 26px;
      }
      .take-card {
        width: 170px;
      }
      .prompt-box {
        height: 130px;
      }
      .video-thumbnail-container img {
        height: 130px;
      }
      .time-info {
        font-size: 14px;
      }
      .alert-joining span {
        font-size: 14px;
      }
    }

    /* Larger phones 481-768 */

    /* Tablet+ (show side by side if wanted) */

    /* Landscape mode optimization */
    @media (max-height: 500px) {
      .editor-controls {
        gap: 8px;
        padding: 8px 0;
      }
      .player-control {
        padding: 8px;
        gap: 8px;
      }
      .create-new-take {
        height: 70px;
      }
    }

    /* ─── Take Tab Content ─── */
    .take-tab-panel {
      display: none;
    }
    .take-tab-panel.active {
      display: block;
    }

    /* Dual dropzone (Start Frame + End Frame) */
    .dual-dropzone-row {
      display: flex;
      gap: 6px;
      width: 100%;
    }

    .dual-dropzone-row .frame-slot {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .dual-dropzone-row .frame-slot-label {
      order: 1;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(200,200,200,0.5);
      text-align: center;
      line-height: 1;
    }

    .dual-dropzone-row .media-dropzone {
      height: auto;
      aspect-ratio: 1 / 1;
    }

    .dual-dropzone-row .dropzone-placeholder i {
      font-size: 22px;
    }

    .dual-dropzone-row .dropzone-placeholder span {
      font-size: 9px;
    }

    .dual-dropzone-row .dz-type-badge {
      font-size: 8px !important;
      padding: 1px 5px !important;
    }

    .media-dropzone {
      width: 100%;
      height: 160px;
      border-radius: var(--radius-sm);
      border: 1.5px dashed rgba(255,255,255,0.15);
      background: var(--bg-card);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .media-dropzone:hover,
    .media-dropzone.drag-over {
      border-color: var(--accent);
      background: rgba(232, 255, 23, 0.04);
    }

    .media-dropzone.drag-over {
      border-style: solid;
    }

    .media-dropzone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    .dropzone-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      pointer-events: none;
      z-index: 1;
    }

    .dropzone-placeholder i {
      font-size: 30px;
      color: rgba(200, 200, 200, 0.45);
      transition: color 0.2s;
    }

    .media-dropzone:hover .dropzone-placeholder i,
    .media-dropzone.drag-over .dropzone-placeholder i {
      color: var(--accent);
    }

    .dropzone-placeholder span {
      font-size: 11px;
      color: rgba(200,200,200,0.4);
      text-align: center;
      line-height: 1.3;
    }

    .dropzone-placeholder .dz-type-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(232,255,23,0.12);
      border-radius: 4px;
      padding: 2px 7px;
    }

    /* Preview states */
    .media-dropzone .dz-preview-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      display: none;
      border-radius: var(--radius-sm);
    }

    .media-dropzone .dz-preview-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      display: none;
      border-radius: var(--radius-sm);
    }

    .media-dropzone.has-media .dropzone-placeholder {
      display: none;
    }

    .media-dropzone.has-media .dz-preview-img,
    .media-dropzone.has-media .dz-preview-video {
      display: block;
    }

    .media-dropzone.has-media {
      border-style: solid;
      border-color: rgba(255,255,255,0.1);
    }

    /* Overlay badge on filled media */
    .dz-media-overlay {
      position: absolute;
      bottom: 6px;
      left: 6px;
      display: none;
      align-items: center;
      gap: 4px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      border-radius: 6px;
      padding: 3px 7px;
      z-index: 3;
      pointer-events: none;
    }

    .media-dropzone.has-media .dz-media-overlay {
      display: flex;
    }

    .dz-media-overlay i {
      font-size: 14px;
      color: var(--accent);
    }

    .dz-media-overlay span {
      font-size: 11px;
      color: var(--text-primary);
      max-width: 100px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Remove media button */
    .dz-remove-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 24px;
      height: 24px;
      background: rgba(0,0,0,0.65);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 4;
      cursor: pointer;
      transition: background 0.2s;
    }

    .media-dropzone.has-media .dz-remove-btn {
      display: flex;
    }

    .dz-remove-btn:hover {
      background: rgba(220, 50, 50, 0.7);
    }

    .dz-remove-btn i {
      font-size: 14px;
      color: #fff;
      pointer-events: none;
    }

    /* Video play overlay */
    .dz-video-play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(237, 232, 221, 0.3);
      border-radius: 50%;
      width: 38px;
      height: 38px;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 5;
      pointer-events: auto;
      cursor: pointer;
      transition: background 0.2s;
    }

    .dz-video-play:hover {
      background: rgba(237, 232, 221, 0.5);
    }

    .media-dropzone.has-media.is-video .dz-video-play {
      display: flex;
    }

    .dz-video-play i {
      font-size: 18px;
      color: #fff;
    }

    /* ═══════════════════════════ SCROLLBAR HIDING GLOBAL ═══════════════════════════ */
    .scroll-y {
      overflow-y: auto;
      scrollbar-width: none;
    }
    .scroll-y::-webkit-scrollbar { display: none; }

    /* Smooth transitions */
    i { transition: color 0.2s; }
  </style>
</head>
<body>

<div class="editor-page" id="editorPage">

          <!-- Takes Horizontal Scroll -->

              <!-- Add Take button (hidden when no takes) -->
              <div class="add-take-card" style="display:none">
                <div class="add-take-inner">
                  <div class="add-take-btn" id="addTakeBtn">
                    <div class="add-take-icon">
                      <i class="ph ph-plus"></i>
                    </div>
                    <span>Add take</span>

            </div>

          <!-- Create New Take (bottom) -->
          <div class="create-take-wrapper">

              <div class="create-take-content">

<script>
  // ═══════════════════════════ Sequential Video Playback System ═══════════════════════════

  // Global state
  let currentPreviewVideo = null;
  let isLooping = false;
  let isDragging = false;
  let takeCounter = 0;
  const takesQuery = [];

  // Sequential playlist state
  // Each entry: { file, duration, objectURL, takeCard }
  let videoPlaylist = [];
  let totalDuration = 0;
  let currentPlaylistIndex = -1;
  let isSequentialPlaying = false;
  let globalTimeOffset = 0; // accumulated time of previous clips

  // DOM refs
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const progressThumb = document.getElementById('progressThumb');
  const btnPlay = document.getElementById('btnPlay');
  const btnPause = document.getElementById('btnPause');
  const btnStop = document.getElementById('btnStop');
  const btnLoop = document.getElementById('btnLoop');
  const timeInfoEl = document.querySelector('.time-info');
  const videoPreview = document.getElementById('videoPreview');
  const alertEl = videoPreview.querySelector('.alert-joining');

  // ═══ Utility ═══
  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
  }

  // ═══ Playlist Management ═══

  function rebuildPlaylist() {
    // Clean up old object URLs
    videoPlaylist.forEach(entry => {
      if (entry.objectURL) URL.revokeObjectURL(entry.objectURL);
    });
    videoPlaylist = [];
    totalDuration = 0;

    const cards = document.querySelectorAll('.take-card');
    const pendingEntries = [];

    cards.forEach(card => {
      const videoDz = card.querySelector('.media-dropzone[data-type="video"]');
      if (videoDz && videoDz._videoFile && videoDz._videoDuration) {
        const entry = {
          file: videoDz._videoFile,
          duration: videoDz._videoDuration,
          objectURL: null,
          takeCard: card
        };
        pendingEntries.push(entry);
        totalDuration += entry.duration;
      }
    });

    videoPlaylist = pendingEntries;
    updateTimeDisplay();
    updateTakeDurations();
  }

  function updateTakeDurations() {
    videoPlaylist.forEach(entry => {
      const durEl = entry.takeCard.querySelector('.ta-duration');
      if (durEl) {
        durEl.textContent = Math.round(entry.duration) + 's';
      }
    });
  }

  function updateTimeDisplay() {
    if (totalDuration <= 0) {
      timeInfoEl.textContent = '00:00/00:00';
      progressFill.style.width = '0%';
      return;
    }
    const currentGlobal = getCurrentGlobalTime();
    const pct = (currentGlobal / totalDuration) * 100;
    progressFill.style.width = Math.min(100, pct) + '%';
    timeInfoEl.textContent = formatTime(currentGlobal) + '/' + formatTime(totalDuration);
  }

  function getCurrentGlobalTime() {
    if (currentPlaylistIndex < 0 || !currentPreviewVideo) {
      return globalTimeOffset;
    }
    return globalTimeOffset + (currentPreviewVideo.currentTime || 0);
  }

  function getOffsetForIndex(idx) {
    let offset = 0;
    for (let i = 0; i < idx && i < videoPlaylist.length; i++) {
      offset += videoPlaylist[i].duration;
    }
    return offset;
  }

  // ═══ Preview Video Management ═══

  function loadVideoInPreview(playlistIndex, autoplay, startTime) {
    if (playlistIndex < 0 || playlistIndex >= videoPlaylist.length) return;

    // Clean up existing
    cleanupPreviewVideo();

    const entry = videoPlaylist[playlistIndex];
    currentPlaylistIndex = playlistIndex;
    globalTimeOffset = getOffsetForIndex(playlistIndex);

    const objURL = URL.createObjectURL(entry.file);
    entry.objectURL = objURL;

    const videoEl = document.createElement('video');
    videoEl.src = objURL;
    videoEl.playsInline = true;
    videoEl.preload = 'auto';
    videoEl.style.cssText = 'width:100%;height:100%;object-fit:contain;border-radius:var(--radius-xl);position:absolute;inset:0;z-index:2;background:#000;';

    currentPreviewVideo = videoEl;
    if (alertEl) alertEl.style.display = 'none';

    // Highlight active take
    highlightActiveTake(playlistIndex);

    videoEl.addEventListener('loadedmetadata', () => {
      if (startTime && startTime > 0) {
        videoEl.currentTime = startTime;
      }
      if (autoplay) {
        videoEl.play().catch(() => {});
      }
    });

    videoEl.addEventListener('play', () => {
      btnPlay.style.display = 'none';
      btnPause.style.display = '';
      isSequentialPlaying = true;
    });

    videoEl.addEventListener('pause', () => {
      if (!videoEl._endingNaturally) {
        btnPlay.style.display = '';
        btnPause.style.display = 'none';
      }
    });

    videoEl.addEventListener('timeupdate', () => {
      if (!isDragging) {
        updateTimeDisplay();
      }
    });

    videoEl.addEventListener('ended', () => {
      videoEl._endingNaturally = true;
      // Move to next in playlist
      const nextIndex = currentPlaylistIndex + 1;
      if (nextIndex < videoPlaylist.length) {
        loadVideoInPreview(nextIndex, true, 0);
      } else {
        // Playlist finished
        if (isLooping && videoPlaylist.length > 0) {
          loadVideoInPreview(0, true, 0);
        } else {
          isSequentialPlaying = false;
          btnPlay.style.display = '';
          btnPause.style.display = 'none';
          progressFill.style.width = '100%';
          globalTimeOffset = totalDuration;
          currentPlaylistIndex = -1;
          updateTimeDisplay();
          // Reset to beginning state
          setTimeout(() => {
            progressFill.style.width = '0%';
            globalTimeOffset = 0;
            updateTimeDisplay();
          }, 1000);
        }
      }
    });

    videoPreview.appendChild(videoEl);
  }

  function cleanupPreviewVideo() {
    if (currentPreviewVideo) {
      currentPreviewVideo.pause();
      currentPreviewVideo._endingNaturally = true;
      if (currentPreviewVideo.src) {
        // Don't revoke here; managed by playlist
      }
      currentPreviewVideo.remove();
      currentPreviewVideo = null;
    }
  }

  function loadFirstVideoAsPreview(file) {
    // Called when first video is added — load paused at frame 0
    rebuildPlaylist();
    if (videoPlaylist.length > 0) {
      loadVideoInPreview(0, false, 0);
    }
  }

  function highlightActiveTake(idx) {
    document.querySelectorAll('.take-body.inputs.active-take').forEach(b => {
      b.classList.remove('active-take');
    });
    if (idx >= 0 && idx < videoPlaylist.length) {
      const body = videoPlaylist[idx].takeCard.querySelector('.take-body.inputs');
      if (body) {
        body.classList.add('active-take');
      }
      videoPlaylist[idx].takeCard.scrollIntoView({ behavior: 'smooth', inline: 'center' });
    }
  }

  // ═══ Progress Bar ═══

  function seekToGlobalTime(globalTime) {
    globalTime = Math.max(0, Math.min(totalDuration, globalTime));
    // Find which clip this time falls in
    let accumulated = 0;
    for (let i = 0; i < videoPlaylist.length; i++) {
      if (globalTime <= accumulated + videoPlaylist[i].duration) {
        const localTime = globalTime - accumulated;
        const wasPlaying = isSequentialPlaying;
        loadVideoInPreview(i, wasPlaying, localTime);
        return;
      }
      accumulated += videoPlaylist[i].duration;
    }
    // Past the end
    if (videoPlaylist.length > 0) {
      const lastIdx = videoPlaylist.length - 1;
      loadVideoInPreview(lastIdx, false, videoPlaylist[lastIdx].duration);
    }
  }

  function seekToPercent(pct) {
    pct = Math.max(0, Math.min(100, pct));
    if (totalDuration > 0) {
      const targetTime = (pct / 100) * totalDuration;
      seekToGlobalTime(targetTime);
    }
    progressFill.style.width = pct + '%';
  }

  function getPctFromEvent(e) {
    const rect = progressBar.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    return ((clientX - rect.left) / rect.width) * 100;
  }

  progressBar.addEventListener('click', (e) => {
    if (e.target === progressThumb) return;
    seekToPercent(getPctFromEvent(e));
  });

  // Mouse drag
  progressThumb.addEventListener('mousedown', (e) => {
    e.preventDefault();
    isDragging = true;
    progressBar.classList.add('dragging');
    progressThumb.classList.add('dragging');
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const pct = getPctFromEvent(e);
    progressFill.style.width = Math.max(0, Math.min(100, pct)) + '%';
    // Update time display while dragging
    if (totalDuration > 0) {
      const targetTime = (Math.max(0, Math.min(100, pct)) / 100) * totalDuration;
      timeInfoEl.textContent = formatTime(targetTime) + '/' + formatTime(totalDuration);
    }
  });

  document.addEventListener('mouseup', (e) => {
    if (isDragging) {
      isDragging = false;
      progressBar.classList.remove('dragging');
      progressThumb.classList.remove('dragging');
      seekToPercent(getPctFromEvent(e));
    }
  });

  // Touch drag
  progressThumb.addEventListener('touchstart', () => {
    isDragging = true;
    progressBar.classList.add('dragging');
    progressThumb.classList.add('dragging');
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
    const pct = getPctFromEvent(e);
    progressFill.style.width = Math.max(0, Math.min(100, pct)) + '%';
    if (totalDuration > 0) {
      const targetTime = (Math.max(0, Math.min(100, pct)) / 100) * totalDuration;
      timeInfoEl.textContent = formatTime(targetTime) + '/' + formatTime(totalDuration);
    }
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    if (isDragging) {
      isDragging = false;
      progressBar.classList.remove('dragging');
      progressThumb.classList.remove('dragging');
      // Seek to last known position
      const fillWidth = parseFloat(progressFill.style.width) || 0;
      seekToPercent(fillWidth);
    }
  });

  // ═══ Play/Pause/Stop/Loop Buttons ═══

  btnPlay.addEventListener('click', () => {
    if (videoPlaylist.length === 0) return;
    if (currentPreviewVideo) {
      currentPreviewVideo.play().catch(() => {});
    } else {
      // Start from beginning
      loadVideoInPreview(0, true, 0);
    }
  });

  btnPause.addEventListener('click', () => {
    if (currentPreviewVideo) {
      isSequentialPlaying = false;
      currentPreviewVideo.pause();
    }
  });

  btnStop.addEventListener('click', () => {
    isSequentialPlaying = false;
    cleanupPreviewVideo();
    currentPlaylistIndex = -1;
    globalTimeOffset = 0;
    progressFill.style.width = '0%';
    btnPlay.style.display = '';
    btnPause.style.display = 'none';
    updateTimeDisplay();
    document.querySelectorAll('.take-body.inputs.active-take').forEach(b => {
      b.classList.remove('active-take');
    });
    // Reload first video paused if available
    if (videoPlaylist.length > 0) {
      loadVideoInPreview(0, false, 0);
    } else {
      if (alertEl) alertEl.style.display = '';
    }
  });

  btnLoop.addEventListener('click', () => {
    isLooping = !isLooping;
    btnLoop.classList.toggle('active', isLooping);
  });

  // ═══ Right side menu / Fullscreen ═══

  document.querySelectorAll('.right-side-menu i').forEach(icon => {
    icon.addEventListener('click', () => {
      document.querySelectorAll('.right-side-menu i').forEach(i => i.classList.remove('active'));
      icon.classList.add('active');
    });
  });

  document.getElementById('btnFullscreen').addEventListener('click', () => {
    if (!document.fullscreenElement) {
      videoPreview.requestFullscreen?.() || videoPreview.webkitRequestFullscreen?.();
    } else {
      document.exitFullscreen?.() || document.webkitExitFullscreen?.();
    }
  });

  // ═══════════════════════════ Takes Query Data ═══════════════════════════

  function getTakesQuery() {
    const cards = document.querySelectorAll('.take-card');
    const query = [];
    cards.forEach((card) => {
      query.push(collectTakeData(card));
    });
    return query;
  }

  function collectTakeData(card) {
    const prompt = card.querySelector('.prompt-box')?.value || '';
    const imagePanel = card.querySelector('[data-panel="image"]');
    const singleDz = imagePanel?.querySelector(':scope > .media-dropzone[data-type="image"]');
    const singleImg = singleDz?.classList.contains('has-media')
      ? singleDz.querySelector('.dz-preview-img')?.src || '' : '';

    const dualRow = imagePanel?.querySelector('.dual-dropzone-row');
    const frameSlots = dualRow?.querySelectorAll('.frame-slot') || [];
    let startFrameImg = '', endFrameImg = '';
    if (frameSlots.length >= 2) {
      const startDz = frameSlots[0].querySelector('.media-dropzone');
      const endDz = frameSlots[1].querySelector('.media-dropzone');
      startFrameImg = startDz?.classList.contains('has-media')
        ? startDz.querySelector('.dz-preview-img')?.src || '' : '';
      endFrameImg = endDz?.classList.contains('has-media')
        ? endDz.querySelector('.dz-preview-img')?.src || '' : '';
    }

    const isDualMode = dualRow && dualRow.style.display !== 'none';
    let imageAttached = '', imageStartFrame = '', imageEndFrame = '';
    if (isDualMode) {
      imageStartFrame = startFrameImg;
      imageEndFrame = endFrameImg;
    } else {
      imageAttached = singleImg;
    }

    const videoDz = card.querySelector('.media-dropzone[data-type="video"]');
    const videoAttached = videoDz?.classList.contains('has-media') ? 'attached' : '';
    const durationText = card.querySelector('.ta-duration')?.textContent || '10s';
    const duration = parseInt(durationText) || 10;

    return {
      "image_attached": imageAttached,
      "image_start_frame": imageStartFrame,
      "image_end_frame": imageEndFrame,
      "video_attached": videoAttached,
      "prompt": prompt,
      "model": "grok-imagine-video",
      "duration": duration,
      "aspect_ratio": "9:16",
      "resolution": "720p"
    };
  }

  // ═══ Dropzone Logic ═══

  function initDropzone(dz) {
    const input = dz.querySelector('input[type="file"]');
    const type = dz.dataset.type;

    dz.addEventListener('dragover', (e) => {
      e.preventDefault();
      dz.classList.add('drag-over');
    });
    dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
    dz.addEventListener('drop', (e) => {
      e.preventDefault();
      dz.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) handleMediaFile(dz, file, type);
    });

    input.addEventListener('change', () => {
      if (input.files[0]) handleMediaFile(dz, input.files[0], type);
    });

    const removeBtn = dz.querySelector('.dz-remove-btn');
    if (removeBtn) {
      removeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        clearDropzone(dz, type);
      });
    }

    // Video play button — jump to this clip in the sequential playlist and play
    if (type === 'video') {
      const playBtn = dz.querySelector('.dz-video-play');
      if (playBtn) {
        playBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          e.preventDefault();
          if (dz._videoFile) {
            // Find this clip's index in the playlist
            const card = dz.closest('.take-card');
            const idx = videoPlaylist.findIndex(entry => entry.takeCard === card);
            if (idx >= 0) {
              loadVideoInPreview(idx, true, 0);
            }
          }
        });
      }
    }
  }

  function handleMediaFile(dz, file, type) {
    const filenameEl = dz.querySelector('.dz-filename');
    if (filenameEl) filenameEl.textContent = file.name;

    if (type === 'image') {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = dz.querySelector('.dz-preview-img');
        img.src = ev.target.result;
        dz.classList.add('has-media');
        console.log('Takes query:', JSON.stringify(getTakesQuery(), null, 2));
      };
      reader.readAsDataURL(file);
    } else if (type === 'video') {
      const url = URL.createObjectURL(file);
      const video = document.createElement('video');
      video.src = url;
      video.muted = true;
      video.preload = 'metadata';

      video.addEventListener('loadedmetadata', () => {
        // Store real duration
        dz._videoDuration = video.duration;
        video.currentTime = 0.5;
      });

      video.addEventListener('seeked', () => {
        const canvas = dz.querySelector('.dz-preview-video');
        canvas.width = video.videoWidth || 200;
        canvas.height = video.videoHeight || 160;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(url);
        dz.classList.add('has-media', 'is-video');
        dz._videoFile = file;

        // Update ta-duration with real duration
        const card = dz.closest('.take-card');
        const durEl = card?.querySelector('.ta-duration');
        if (durEl && dz._videoDuration) {
          durEl.textContent = Math.round(dz._videoDuration) + 's';
        }

        // Rebuild playlist and check if this is the first video
        const hadVideos = videoPlaylist.length > 0;
        rebuildPlaylist();

        // Auto-load first video in preview (paused) when first clip is added
        if (!hadVideos && videoPlaylist.length > 0) {
          loadVideoInPreview(0, false, 0);
        } else if (videoPlaylist.length > 0 && !isSequentialPlaying) {
          // Update time display for new total
          updateTimeDisplay();
        }

        console.log('Takes query:', JSON.stringify(getTakesQuery(), null, 2));
      });

      video.addEventListener('error', () => {
        dz.classList.add('has-media', 'is-video');
      });
    }
  }

  function clearDropzone(dz, type) {
    dz.classList.remove('has-media', 'is-video');
    const input = dz.querySelector('input[type="file"]');
    if (input) input.value = '';
    if (type === 'image') {
      const img = dz.querySelector('.dz-preview-img');
      if (img) img.src = '';
    } else if (type === 'video') {
      const canvas = dz.querySelector('.dz-preview-video');
      if (canvas) {
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
      delete dz.dataset.videoSrc;
      delete dz._videoFile;
      delete dz._videoDuration;

      // Rebuild playlist after removal
      rebuildPlaylist();
      // If no more videos, cleanup preview
      if (videoPlaylist.length === 0) {
        cleanupPreviewVideo();
        currentPlaylistIndex = -1;
        globalTimeOffset = 0;
        btnPlay.style.display = '';
        btnPause.style.display = 'none';
        if (alertEl) alertEl.style.display = '';
        document.querySelectorAll('.take-body.inputs.active-take').forEach(b => {
          b.classList.remove('active-take');
        });
      } else if (!isSequentialPlaying) {
        loadVideoInPreview(0, false, 0);
      }
    }
    const filenameEl = dz.querySelector('.dz-filename');
    if (filenameEl) filenameEl.textContent = '';
    console.log('Takes query:', JSON.stringify(getTakesQuery(), null, 2));
  }

  // ═══ Take Label Tab Switching ═══

  function initTakeCardTabs(card) {
    const tabIcons = card.querySelectorAll('.take-label i[data-tab]');
    tabIcons.forEach(icon => {
      icon.addEventListener('click', () => {
        switchTakeTab(card, icon.dataset.tab);
      });
    });
  }

  function switchTakeTab(card, tab) {
    card.querySelectorAll('.take-label i[data-tab]').forEach(i => {
      i.classList.toggle('icon-active', i.dataset.tab === tab);
      i.classList.toggle('icon-default', i.dataset.tab !== tab);
    });
    card.querySelectorAll('.take-tab-panel').forEach(panel => {
      panel.classList.toggle('active', panel.dataset.panel === tab);
    });
    card.dataset.activeTab = tab;
  }

    const promptBox = card.querySelector('.prompt-box');

  // ═══ Add take buttons ═══

  function updateTakesVisibility() {
    const takesList = document.getElementById('takesList');
    const hasTakes = takesList.querySelectorAll('.take-card').length > 0;
    const addCard = takesList.querySelector('.add-take-card');
    const createWrapper = document.querySelector('.create-take-wrapper');
    const scrollWrapper = document.querySelector('.takes-scroll-wrapper');

    scrollWrapper.style.display = hasTakes ? '' : 'none';
    addCard.style.display = hasTakes ? '' : 'none';
    createWrapper.style.display = hasTakes ? 'none' : '';
  }

  function addNewTake() {
    const takesList = document.getElementById('takesList');
    const addCard = takesList.querySelector('.add-take-card');
    const newTake = createTakeCard();
    takesList.insertBefore(newTake, addCard);
    updateTakesVisibility();
    newTake.scrollIntoView({ behavior: 'smooth', inline: 'end' });
    console.log('Takes query:', JSON.stringify(getTakesQuery(), null, 2));
  }

  document.getElementById('addTakeBtn').addEventListener('click', addNewTake);
  document.getElementById('createTakeBtn').addEventListener('click', addNewTake);

  // Initial state
  updateTakesVisibility();
  updateTimeDisplay();

  // ═══════════════════════════ Drag & Drop Reorder Takes ═══════════════════════════

  (function initTakesDragAndDrop() {
    const takesList = document.getElementById('takesList');
    let dragState = null; // { card, ghost, startX, startY, offsetX, offsetY, originalIndex }

    function getTakeCards() {
      return Array.from(takesList.querySelectorAll('.take-card'));
    }

    function getCardIndex(card) {
      return getTakeCards().indexOf(card);
    }

    function createGhost(card, clientX, clientY) {
      const rect = card.getBoundingClientRect();
      const ghost = card.cloneNode(true);
      ghost.classList.add('drag-ghost');
      ghost.style.width = rect.width + 'px';
      ghost.style.height = rect.height + 'px';
      ghost.style.left = rect.left + 'px';
      ghost.style.top = rect.top + 'px';
      document.body.appendChild(ghost);
      return {
        el: ghost,
        offsetX: clientX - rect.left,
        offsetY: clientY - rect.top
      };
    }

    function moveGhost(ghost, clientX, clientY) {
      ghost.el.style.left = (clientX - ghost.offsetX) + 'px';
      ghost.el.style.top = (clientY - ghost.offsetY) + 'px';
    }

    function removeGhost() {
      if (dragState && dragState.ghost) {
        dragState.ghost.el.remove();
      }
    }

    function clearGapClasses() {
      getTakeCards().forEach(c => {
        c.classList.remove('drag-gap-left', 'drag-gap-right');
      });
    }

    function getDropIndex(clientX) {
      const cards = getTakeCards().filter(c => c !== dragState.card);
      if (cards.length === 0) return 0;

      for (let i = 0; i < cards.length; i++) {
        const rect = cards[i].getBoundingClientRect();
        const midX = rect.left + rect.width / 2;
        if (clientX < midX) {
          return getCardIndex(cards[i]);
        }
      }
      // Past the last card
      return getCardIndex(cards[cards.length - 1]) + 1;
    }

    function updateGapIndicators(clientX) {
      clearGapClasses();
      if (!dragState) return;

      const cards = getTakeCards().filter(c => c !== dragState.card);
      if (cards.length === 0) return;

      // Find which gap the cursor is in
      for (let i = 0; i < cards.length; i++) {
        const rect = cards[i].getBoundingClientRect();
        const midX = rect.left + rect.width / 2;
        if (clientX < midX) {
          // Cursor is before card[i] — open gap before it
          cards[i].classList.add('drag-gap-left');
          if (i > 0) cards[i - 1].classList.add('drag-gap-right');
          return;
        }
      }
      // Cursor is past the last card — open gap after last
      cards[cards.length - 1].classList.add('drag-gap-right');
    }

    function finalizeDrop(clientX) {
      const addCard = takesList.querySelector('.add-take-card');
      const dropIdx = getDropIndex(clientX);
      const cards = getTakeCards();
      const currentIdx = cards.indexOf(dragState.card);

      // Only move if position actually changed
      if (dropIdx !== currentIdx && dropIdx !== currentIdx + 1) {
        // Remove card from current position
        dragState.card.remove();

        // Recalculate targets after removal
        const remainingCards = getTakeCards();
        const adjustedIdx = dropIdx > currentIdx ? dropIdx - 1 : dropIdx;

        if (adjustedIdx >= remainingCards.length) {
          takesList.insertBefore(dragState.card, addCard);
        } else {
          takesList.insertBefore(dragState.card, remainingCards[adjustedIdx]);
        }

        // Rebuild video playlist after reorder
        rebuildPlaylist();
      }
    }

    // ─── Pointer Events (unified mouse + touch) ───

    let longPressTimer = null;
    let pendingStart = null;
    const LONG_PRESS_MS = 180;
    const DRAG_THRESHOLD = 6;

    function onPointerDown(e) {
      const card = e.target.closest('.take-card');
      if (!card) return;

      // Don't interfere with interactive elements
      const interactive = e.target.closest('textarea, input, .dz-remove-btn, .dz-video-play, .take-label i, .media-dropzone input[type="file"]');
      if (interactive) return;

      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      pendingStart = { card, clientX, clientY };

      // For touch: use long press to initiate drag (avoid conflicting with scroll)
      if (e.touches) {
        longPressTimer = setTimeout(() => {
          startDrag(pendingStart.card, pendingStart.clientX, pendingStart.clientY);
          pendingStart = null;
        }, LONG_PRESS_MS);
      }
    }

    function startDrag(card, clientX, clientY) {
      const ghost = createGhost(card, clientX, clientY);
      dragState = {
        card,
        ghost,
        originalIndex: getCardIndex(card)
      };
      card.classList.add('dragging');

      // Prevent text selection globally during drag
      document.body.style.userSelect = 'none';
      document.body.style.webkitUserSelect = 'none';
    }

    function onPointerMove(e) {
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      // If we haven't started dragging yet (mouse), check threshold
      if (pendingStart && !dragState && !e.touches) {
        const dx = clientX - pendingStart.clientX;
        const dy = clientY - pendingStart.clientY;
        if (Math.abs(dx) > DRAG_THRESHOLD || Math.abs(dy) > DRAG_THRESHOLD) {
          startDrag(pendingStart.card, pendingStart.clientX, pendingStart.clientY);
          pendingStart = null;
        }
        return;
      }

      // Cancel long press if finger moves too much
      if (pendingStart && e.touches && longPressTimer) {
        const dx = clientX - pendingStart.clientX;
        const dy = clientY - pendingStart.clientY;
        if (Math.abs(dx) > DRAG_THRESHOLD || Math.abs(dy) > DRAG_THRESHOLD) {
          clearTimeout(longPressTimer);
          longPressTimer = null;
          pendingStart = null;
          return;
        }
      }

      if (!dragState) return;
      if (e.cancelable) e.preventDefault();

      moveGhost(dragState.ghost, clientX, clientY);
      updateGapIndicators(clientX);

      // Auto-scroll the takes list when dragging near edges
      const listRect = takesList.getBoundingClientRect();
      const edgeZone = 40;
      if (clientX < listRect.left + edgeZone) {
        takesList.scrollBy({ left: -12 });
      } else if (clientX > listRect.right - edgeZone) {
        takesList.scrollBy({ left: 12 });
      }
    }

    function onPointerUp(e) {
      if (longPressTimer) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
      pendingStart = null;

      if (!dragState) return;

      const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;

      finalizeDrop(clientX);

      dragState.card.classList.remove('dragging');
      removeGhost();
      clearGapClasses();

      document.body.style.userSelect = '';
      document.body.style.webkitUserSelect = '';

      dragState = null;
    }

    // Mouse events
    takesList.addEventListener('mousedown', onPointerDown);
    document.addEventListener('mousemove', onPointerMove);
    document.addEventListener('mouseup', onPointerUp);

    // Touch events
    takesList.addEventListener('touchstart', onPointerDown, { passive: true });
    document.addEventListener('touchmove', onPointerMove, { passive: false });
    document.addEventListener('touchend', onPointerUp);
    document.addEventListener('touchcancel', onPointerUp);
  })();
</script>
