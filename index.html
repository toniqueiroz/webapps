<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Audio Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #07070f;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    padding: 24px;
  }

  .shell {
    width: 100%;
    max-width: 560px;
    background: #0d0d18;
    border: 1px solid #1c1c30;
    border-radius: 20px;
    padding: 28px 24px 22px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #6c63ff;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .logo-dot.idle { background: #2a2a44; }
  .logo-dot.playing { animation: blink 1.4s ease-in-out infinite; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .header-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: #3a3a5e;
    text-transform: uppercase;
    flex: 1;
  }

  /* URL input */
  .url-row {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
  }

  .url-input {
    flex: 1;
    background: #111122;
    border: 1px solid #22223a;
    border-radius: 10px;
    padding: 10px 14px;
    color: #c8c8e0;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
  }
  .url-input::placeholder { color: #2e2e4a; }
  .url-input:focus { border-color: #6c63ff; }

  .load-btn {
    background: #6c63ff;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    color: #fff;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  .load-btn:hover { background: #8078ff; }
  .load-btn:active { transform: scale(0.96); }

  /* Waveform */
  .wave-wrap {
    background: #0a0a14;
    border: 1px solid #181828;
    border-radius: 14px;
    padding: 0;
    margin-bottom: 16px;
    overflow: hidden;
    position: relative;
    height: 100px;
  }

  #waveCanvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  .wave-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .wave-overlay span {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: #252538;
    text-transform: uppercase;
    transition: opacity 0.4s;
  }

  /* Track info */
  .track-box {
    min-height: 44px;
    margin-bottom: 14px;
  }

  .track-title {
    font-size: 14px;
    font-weight: 500;
    color: #cccce4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
    line-height: 1.3;
  }

  .track-author {
    font-size: 12px;
    color: #44446a;
    font-family: 'Space Mono', monospace;
  }

  /* Progress */
  .progress-bar {
    height: 3px;
    background: #181828;
    border-radius: 99px;
    cursor: pointer;
    margin-bottom: 8px;
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #6c63ff 0%, #a78bfa 100%);
    border-radius: 99px;
    transition: width 0.4s linear;
    pointer-events: none;
  }

  .time-row {
    display: flex;
    justify-content: space-between;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: #33334e;
    margin-bottom: 18px;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .ghost-btn {
    background: none;
    border: none;
    color: #44446a;
    cursor: pointer;
    padding: 8px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
  }
  .ghost-btn:hover { color: #9898c0; background: #181828; }

  .play-btn {
    width: 52px; height: 52px;
    background: #6c63ff;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  .play-btn:hover { background: #8078ff; }
  .play-btn:active { transform: scale(0.94); }

  /* Volume */
  .vol-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .vol-icon { color: #2e2e4a; flex-shrink: 0; }

  input[type=range].vol {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: #181828;
    border-radius: 99px;
    outline: none;
    cursor: pointer;
  }
  input[type=range].vol::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: #6c63ff;
    cursor: pointer;
    transition: transform 0.1s;
  }
  input[type=range].vol::-webkit-slider-thumb:hover { transform: scale(1.3); }
  input[type=range].vol::-moz-range-thumb {
    width: 13px; height: 13px;
    border-radius: 50%;
    background: #6c63ff;
    border: none;
    cursor: pointer;
  }

  /* Hidden player */
  #ytplayer {
    position: fixed;
    left: -9999px;
    top: -9999px;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="shell">
  <div class="header">
    <div class="logo-dot idle" id="dot"></div>
    <span class="header-label">yt audio player</span>
  </div>

  <div class="url-row">
    <input class="url-input" id="urlInput" type="text" placeholder="cole a url do youtube..." autocomplete="off" spellcheck="false" />
    <button class="load-btn" id="loadBtn">carregar</button>
  </div>

  <div class="wave-wrap">
    <canvas id="waveCanvas"></canvas>
    <div class="wave-overlay">
      <span id="waveMsg">aguardando url</span>
    </div>
  </div>

  <div class="track-box">
    <div class="track-title" id="trackTitle">—</div>
    <div class="track-author" id="trackAuthor">nenhum áudio carregado</div>
  </div>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="time-row">
    <span id="tCur">0:00</span>
    <span id="tDur">0:00</span>
  </div>

  <div class="controls">
    <button class="ghost-btn" id="btnBack" title="−10s">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 .49-3.68"/>
        <text x="8" y="15.5" font-size="5.5" fill="currentColor" stroke="none" font-family="Space Mono,monospace" font-weight="700">10</text>
      </svg>
    </button>

    <button class="play-btn" id="playBtn">
      <svg id="playIcon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5,3 19,12 5,21"/>
      </svg>
    </button>

    <button class="ghost-btn" id="btnFwd" title="+10s">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-.49-3.68"/>
        <text x="8" y="15.5" font-size="5.5" fill="currentColor" stroke="none" font-family="Space Mono,monospace" font-weight="700">10</text>
      </svg>
    </button>
  </div>

  <div class="vol-row">
    <svg class="vol-icon" width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
    </svg>
    <input type="range" class="vol" id="volSlider" min="0" max="100" value="80" step="1">
    <svg class="vol-icon" width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM18.5 12c0-2.77-1.5-5.15-3.75-6.45v12.89C16.75 17.16 18.5 14.77 18.5 12zM21 12c0 4.28-2.31 8-5.75 9.93l1.06 1.06C20.4 21.07 23 16.82 23 12S20.4 2.93 16.31 1.01L15.25 2.07C18.69 4 21 7.72 21 12z"/>
    </svg>
  </div>
</div>

<div id="ytplayer"></div>

<script>
// ── Elements ──────────────────────────────────────────────────
const urlInput    = document.getElementById('urlInput');
const loadBtn     = document.getElementById('loadBtn');
const playBtn     = document.getElementById('playBtn');
const playIcon    = document.getElementById('playIcon');
const btnBack     = document.getElementById('btnBack');
const btnFwd      = document.getElementById('btnFwd');
const progressBar = document.getElementById('progressBar');
const progressFill= document.getElementById('progressFill');
const tCur        = document.getElementById('tCur');
const tDur        = document.getElementById('tDur');
const trackTitle  = document.getElementById('trackTitle');
const trackAuthor = document.getElementById('trackAuthor');
const volSlider   = document.getElementById('volSlider');
const dot         = document.getElementById('dot');
const waveMsg     = document.getElementById('waveMsg');
const canvas      = document.getElementById('waveCanvas');
const ctx         = canvas.getContext('2d');

// ── State ─────────────────────────────────────────────────────
let player      = null;
let ytReady     = false;
let isPlaying   = false;
let progTimer   = null;
let waveAnim    = null;

// Waveform sim state
const NUM_BARS  = 64;
const barHeights= new Float32Array(NUM_BARS);
const barTargets= new Float32Array(NUM_BARS);
let   wavePhase = 0;

// ── Canvas resize ─────────────────────────────────────────────
function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); });

// ── Waveform drawing ──────────────────────────────────────────
function genTargets(active) {
  const t = Date.now() / 1000;
  for (let i = 0; i < NUM_BARS; i++) {
    if (!active) {
      barTargets[i] = 0.03 + 0.02 * Math.sin(i * 0.35 + t * 0.6);
    } else {
      // Organic wave: multiple sine layers + random flutter
      const base = 0.25
        + 0.25 * Math.sin(i * 0.18 + wavePhase * 1.1)
        + 0.15 * Math.sin(i * 0.45 - wavePhase * 1.7)
        + 0.10 * Math.sin(i * 0.09 + wavePhase * 0.5);
      barTargets[i] = Math.max(0.04, Math.min(0.95, base));
    }
  }
}

function drawFrame(active) {
  const dpr  = window.devicePixelRatio || 1;
  const W    = canvas.width  / dpr;
  const H    = canvas.height / dpr;
  const cx   = canvas.getContext('2d');

  cx.clearRect(0, 0, canvas.width, canvas.height);
  cx.save();
  cx.scale(dpr, dpr);

  const gap   = 2;
  const barW  = (W - gap * (NUM_BARS - 1)) / NUM_BARS;
  const lerp  = active ? 0.14 : 0.06;

  for (let i = 0; i < NUM_BARS; i++) {
    barHeights[i] += (barTargets[i] - barHeights[i]) * lerp;
    const h   = barHeights[i] * H * 0.85;
    const x   = i * (barW + gap);
    const y   = (H - h) / 2;

    // color: brighter toward center
    const dist = Math.abs(i - NUM_BARS / 2) / (NUM_BARS / 2);
    const alpha = active ? (0.55 + barHeights[i] * 0.45) : 0.18;
    const r = Math.round(108 + dist * 40);
    const g = Math.round(99  - dist * 20);
    const b = 255;
    cx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    cx.beginPath();
    cx.roundRect(x, y, barW, h, barW / 2);
    cx.fill();
  }

  cx.restore();
}

function animLoop(active) {
  wavePhase += active ? 0.045 : 0.008;
  genTargets(active);
  drawFrame(active);
  waveAnim = requestAnimationFrame(() => animLoop(active));
}

function startWave(active) {
  if (waveAnim) cancelAnimationFrame(waveAnim);
  waveMsg.style.opacity = active ? '0' : '1';
  animLoop(active);
}

// start idle wave immediately
startWave(false);

// ── Helpers ───────────────────────────────────────────────────
function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  s = Math.floor(s);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

function extractId(url) {
  url = url.trim();
  const m = url.match(/(?:v=|\/embed\/|youtu\.be\/)([A-Za-z0-9_-]{11})/);
  if (m) return m[1];
  if (/^[A-Za-z0-9_-]{11}$/.test(url)) return url;
  return null;
}

function setPlayIcon(playing) {
  playIcon.innerHTML = playing
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<polygon points="5,3 19,12 5,21"/>';
}

function startProgress() {
  if (progTimer) clearInterval(progTimer);
  progTimer = setInterval(() => {
    if (!player || typeof player.getCurrentTime !== 'function') return;
    try {
      const cur = player.getCurrentTime();
      const dur = player.getDuration();
      if (dur > 0) {
        progressFill.style.width = (cur / dur * 100).toFixed(2) + '%';
        tCur.textContent = fmt(cur);
        tDur.textContent = fmt(dur);
      }
    } catch (_) {}
  }, 400);
}

// ── YouTube IFrame API ────────────────────────────────────────
window.onYouTubeIframeAPIReady = () => { ytReady = true; };

const ytScript = document.createElement('script');
ytScript.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(ytScript);

function createPlayer(videoId) {
  // tear down old player
  if (player) { try { player.destroy(); } catch (_) {} player = null; }
  if (progTimer) clearInterval(progTimer);
  isPlaying = false;
  setPlayIcon(false);
  dot.className = 'logo-dot idle';
  trackAuthor.textContent = 'carregando...';
  progressFill.style.width = '0%';
  tCur.textContent = '0:00';
  tDur.textContent = '0:00';
  startWave(false);

  const container = document.getElementById('ytplayer');
  container.innerHTML = '';
  const div = document.createElement('div');
  div.id = 'yt_inner';
  container.appendChild(div);

  function build() {
    player = new YT.Player('yt_inner', {
      videoId,
      height: '1',
      width: '1',
      playerVars: {
        autoplay: 1,
        controls: 0,
        playsinline: 1,
        enablejsapi: 1,
        rel: 0,
        iv_load_policy: 3,
        modestbranding: 1,
      },
      events: {
        onReady(e) {
          e.target.setVolume(parseInt(volSlider.value));
          e.target.playVideo();
          const data = e.target.getVideoData();
          trackTitle.textContent  = data.title  || 'Sem título';
          trackAuthor.textContent = data.author || 'Desconhecido';
          dot.className = 'logo-dot playing';
          waveMsg.style.opacity = '0';
          startProgress();
        },
        onStateChange(e) {
          const S = YT.PlayerState;
          if (e.data === S.PLAYING) {
            isPlaying = true;
            setPlayIcon(true);
            dot.className = 'logo-dot playing';
            startWave(true);
            startProgress();
          } else if (e.data === S.PAUSED) {
            isPlaying = false;
            setPlayIcon(false);
            dot.className = 'logo-dot idle';
            startWave(false);
          } else if (e.data === S.ENDED) {
            isPlaying = false;
            setPlayIcon(false);
            dot.className = 'logo-dot idle';
            startWave(false);
            progressFill.style.width = '100%';
            if (progTimer) clearInterval(progTimer);
          }
        },
        onError(e) {
          trackTitle.textContent  = 'Erro ao carregar';
          trackAuthor.textContent = 'verifique a url ou tente outro vídeo';
          dot.className = 'logo-dot idle';
          startWave(false);
          waveMsg.style.opacity = '1';
          waveMsg.textContent = 'erro ao carregar';
        }
      }
    });
  }

  if (ytReady) build();
  else {
    const t = setInterval(() => { if (ytReady) { clearInterval(t); build(); } }, 100);
  }
}

// ── Event listeners ───────────────────────────────────────────
loadBtn.addEventListener('click', () => {
  const id = extractId(urlInput.value);
  if (!id) {
    trackAuthor.textContent = 'url inválida — tente novamente';
    return;
  }
  createPlayer(id);
});

urlInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') loadBtn.click();
});

playBtn.addEventListener('click', () => {
  if (!player) return;
  isPlaying ? player.pauseVideo() : player.playVideo();
});

btnBack.addEventListener('click', () => {
  if (!player) return;
  player.seekTo(Math.max(0, player.getCurrentTime() - 10), true);
});

btnFwd.addEventListener('click', () => {
  if (!player) return;
  player.seekTo(player.getCurrentTime() + 10, true);
});

progressBar.addEventListener('click', e => {
  if (!player) return;
  const r   = progressBar.getBoundingClientRect();
  const pct = (e.clientX - r.left) / r.width;
  const dur = player.getDuration();
  if (dur) player.seekTo(pct * dur, true);
});

volSlider.addEventListener('input', () => {
  if (player && typeof player.setVolume === 'function') {
    player.setVolume(parseInt(volSlider.value));
  }
});
</script>
</body>
</html>
